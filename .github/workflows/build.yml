name: Build PC OSD Simulator
on: [push]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            g++ -o kvm_core.exe src/main.cpp
          else
            g++ -o kvm_core src/main.cpp
          fi
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: osd-app-${{ matrix.os }}
          path: |
            kvm_core*
            ui/