name: Build PC OSD Simulator (Windows)
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          
      - name: Build with MSVC (cl.exe)
        run: |
          cl /EHsc src/main.cpp /Fe:kvm_core.exe
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: osd-windows-app
          path: |
            kvm_core.exe
            ui/