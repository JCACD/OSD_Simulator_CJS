name: Build PC OSD Simulator (Windows)
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          
      - name: Setup MSVC Environment  # 加入這一步：初始化 MSVC 環境
        uses: ilammy/msvc-dev-cmd@v1
          
      - name: Build with MSVC
        run: |
          cl /EHsc src/main.cpp /Fe:kvm_core.exe
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: osd-windows-app
          path: |
            kvm_core.exe
            ui/
